<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Culinary & Cobijo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111827;
    --muted: #6b7280;
    --bg: #ffffff;
    --garnet: #6d0f22;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
  }
  header.top-bar {
    background: #ffffff;
    padding: 48px 40px 36px;
  }
  header.top-bar .header-inner {
    max-width: 1200px;
    margin: 0 auto;
  }
  header.top-bar .logo {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-optical-sizing: none;
    font-variation-settings: 'opsz' 9;
    font-size: 2.6rem;
    letter-spacing: 0.3px;
    margin: 0;
    color: var(--garnet);
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 8px 40px 80px;
  }
  .art-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
    margin-bottom: 48px;
  }
  .art-row img {
    width: 100%;
    aspect-ratio: 4 / 5;
    object-fit: cover;
    display: block;
    box-shadow: 0 2px 10px rgba(17,24,39,0.15);
  }
  .cta {
    text-align: center;
  }
  .cta a {
    font-family: 'Fraunces', serif;
    font-size: 0.9rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #ffffff;
    background: var(--garnet);
    text-decoration: none;
    padding: 14px 32px;
    display: inline-block;
  }
  .cta a:hover {
    background: #52091a;
  }
  footer {
    text-align: center;
    padding: 28px;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    color: var(--muted);
    border-top: 1px solid #e5e0d8;
  }
</style>
</head>
<body>

<header class="top-bar">
  <div class="header-inner">
    <p class="logo">Culinary &amp; Cobijo</p>
  </div>
</header>

<main>

  <div class="art-row">
    <img src="Untitled_Artwork.JPG" alt="Untitled artwork">
    <img src="Untitled_Artwork%201.JPG" alt="Untitled artwork 1">
    <img src="Untitled_Artwork%202.JPG" alt="Untitled artwork 2">
  </div>

  <div class="cta">
    <a href="list.html">Explore Restaurants &amp; Hotels</a>
  </div>

</main>

<footer>
  Culinary &amp; Cobijo
</footer>

</body>
</html>
