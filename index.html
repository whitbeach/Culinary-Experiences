<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Culinary & Cobijo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111827;
    --muted: #6b7280;
    --bg: #ffffff;
    --garnet: #dc0500;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
  }
  header.top-bar {
    background: #ffffff;
    padding: 48px 40px 36px;
  }
  header.top-bar .header-inner {
    max-width: 1200px;
    margin: 0 auto;
  }
  header.top-bar .logo {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-optical-sizing: none;
    font-variation-settings: 'opsz' 9;
    font-size: 2.6rem;
    letter-spacing: 0.3px;
    margin: 0;
    color: var(--garnet);
  }
  nav.tabs-band {
    background: var(--garnet);
    padding: 20px 40px;
  }
  nav.tabs-band .tabs-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 40px;
  }
  nav.tabs-band a.tab-link {
    font-family: 'Fraunces', serif;
    font-size: 0.85rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    text-decoration: none;
    color: rgba(255,255,255,0.75);
    display: flex;
    align-items: baseline;
    gap: 7px;
  }
  nav.tabs-band a.tab-link:hover {
    color: #ffffff;
  }
  nav.tabs-band .tab-idx {
    font-family: 'Inter', sans-serif;
    font-size: 0.7rem;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 40px 80px;
  }
  .art-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
  }
  .art-row img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: contain;
    display: block;
    background: #ffffff;
  }
  footer {
    text-align: center;
    padding: 28px;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    color: var(--muted);
    border-top: 1px solid #e5e0d8;
  }
</style>
</head>
<body>

<header class="top-bar">
  <div class="header-inner">
    <p class="logo">Culinary &amp; Cobijo</p>
  </div>
</header>

<nav class="tabs-band">
  <div class="tabs-inner">
    <a class="tab-link" href="list.html#restaurants"><span class="tab-idx">(8)</span>Restaurants</a>
    <a class="tab-link" href="list.html#hotels"><span class="tab-idx">(14)</span>Hotels</a>
  </div>
</nav>

<main>

  <div class="art-row">
    <img src="Untitled_Artwork.JPG" alt="Untitled artwork">
    <img src="Screenshot%202026-07-23%20135453.png" alt="Untitled artwork 1">
    <img src="Untitled_Artwork%202.JPG" alt="Untitled artwork 2">
  </div>

</main>

<footer>
  Culinary &amp; Cobijo
</footer>

</body>
</html>
